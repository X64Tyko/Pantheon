# Pantheon
#
# Unraid Compose Manager URL:
#   https://raw.githubusercontent.com/X64Tyko/Pantheon/master/docker-compose.yml
#
# Before first run, edit the volume paths below to match your setup:
#   MEDIA_PATH  — your media library root (e.g. /mnt/user/Media on Unraid)
#   FILLER_PATH — where yt-dlp downloads land; set this same path as the
#                 Default Download Path in the Hades Downloads page.
#
# Kairos stores its database and config in ./data/kairos.
# On first start, open the Hades UI at http://<host>:8000 and configure
# your settings through it.
#
# Port map:
#   8000 — Hermes (single public endpoint: UI, API, live TV, HDHomeRun)
#   8081 — Kairos direct access (optional; useful for debugging)

services:
  kairos:
    image: ghcr.io/x64tyko/kairos:latest
    labels:
      - "net.unraid.docker.icon=https://raw.githubusercontent.com/X64Tyko/Pantheon/master/icons/Kairos_Beta_Icon.png"
    ports:
      - "8081:8080"
    environment:
      - KAIROS_SYNC_THREADS=4
      # - KAIROS_DEBUG_EPG=1
    volumes:
      - /mnt/user/appdata/kairos:/data
      - /mnt/user/Media:/media:ro
      - /mnt/user/Media/Filler:/downloads
    restart: unless-stopped

  hephaestus:
    image: ghcr.io/x64tyko/hephaestus:latest
    labels:
      - "net.unraid.docker.icon=https://raw.githubusercontent.com/X64Tyko/Pantheon/master/icons/Hephaestus_Beta_Icon.png"
    environment:
      - KAIROS_URL=http://kairos:8080
    volumes:
      - /mnt/user/Media:/media:ro
    depends_on:
      - kairos
    restart: unless-stopped

  hades:
    image: ghcr.io/x64tyko/hades:latest
    labels:
      - "net.unraid.docker.icon=https://raw.githubusercontent.com/X64Tyko/Pantheon/master/icons/Hades_Beta_Icon.png"
    restart: unless-stopped

  hermes:
    image: ghcr.io/x64tyko/hermes:latest
    labels:
      - "net.unraid.docker.icon=https://raw.githubusercontent.com/X64Tyko/Pantheon/master/icons/Hermes_Beta_Icon.png"
    ports:
      - "8000:8000"
    environment:
      - KAIROS_URL=http://kairos:8080
      - HEPHAESTUS_URL=http://hephaestus:8082
      - HADES_URL=http://hades:3000
    depends_on:
      - kairos
      - hephaestus
      - hades
    restart: unless-stopped

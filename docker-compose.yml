# Pantheon — Kairos + Tunarr stack
#
# Unraid Compose Manager URL:
#   https://raw.githubusercontent.com/X64Tyko/Pantheon/master/docker-compose.yml
#
# Before first run, edit the volume paths below to match your setup:
#   MEDIA_PATH  — your media library root (e.g. /mnt/user/Media on Unraid)
#   FILLER_PATH — where yt-dlp downloads land; set this same path as the
#                 Default Download Path in the Hades Downloads page (/downloads
#                 inside the container maps to wherever FILLER_PATH points).
#                 Point it at a folder Plex already watches so filler shows up
#                 automatically after a library scan.
#
# Kairos stores its database and kairos.conf in ./data/kairos.
# On first start Kairos creates a blank kairos.conf there.  Open the Kairos
# UI (port 8081) and configure your Plex credentials + path maps through it.

services:
  kairos:
    image: ghcr.io/x64tyko/kairos:latest
    ports:
      - "8081:8080"
    environment:
      # Number of parallel workers used when syncing episode metadata from Plex.
      - KAIROS_SYNC_THREADS=4
      # Uncomment to enable verbose EPG scheduling logs.
      # - KAIROS_DEBUG_EPG=1
    volumes:
      - /mnt/user/appdata/kairos:/data
      - /mnt/user/Media:/media:ro          # <-- change to your media path (read-only)
      - /mnt/user/Media/Filler:/downloads  # <-- change to your filler destination (writable)
    restart: unless-stopped

  tunarr:
    image: ghcr.io/x64tyko/tunarr:latest
    runtime: nvidia
    ports:
      - "8000:8000"
    environment:
      - KAIROS_URL=http://kairos:8080
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=video,compute,utility
    volumes:
      - /mnt/user/appdata/tunarr:/config/tunarr
      - /mnt/user/Media:/media:ro   # <-- same path as above
    depends_on:
      - kairos
    restart: unless-stopped

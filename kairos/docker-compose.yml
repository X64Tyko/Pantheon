services:
  kairos:
    build: .
    ports:
      - "8080:8080"
    environment:
      # Optional: override the sync episode-fetch worker count. Defaults to
      # the container's effective core count, capped at 8.
      - KAIROS_SYNC_THREADS=4
      # Set to 1 to enable verbose EPG scheduling logs (project/ensureScheduled detail).
      # Uncomment to diagnose empty guide issues; disable in normal operation.
      # - KAIROS_DEBUG_EPG=1
    volumes:
      - ./data/kairos:/data
      - /mnt/user/Media:/media:ro
    restart: unless-stopped

  tunarr:
    build:
      context: ../tunarr
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - KAIROS_URL=http://kairos:8080
    volumes:
      - ./data/tunarr:/config/tunarr
      - /mnt/user/Media:/media:ro
    depends_on:
      - kairos
    restart: unless-stopped
